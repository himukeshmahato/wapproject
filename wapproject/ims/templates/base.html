<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>IMS</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body {
      font-family: system-ui;
      margin-top: 10px;
      background: #cfe7b1
    }

    .nav {
      background: #1e2419;
      color: #fff;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-radius: 10px;
      width: 80%;
      margin-left: 9%;
    }

    .brand {
      font-weight: 700;
      color: #fff;
      text-decoration: none
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 6px
    }

    .links a {
      color: #1a1717;
      text-decoration: none;
      padding: 6px 9px;
      border-radius: 8px;
      font-size: 14px;
      background: rgb(223, 236, 203);
    }

    .links a:hover {
      background: rgba(255, 255, 255, .18)
    }

    .container {
      max-width: 960px;
      margin: auto;
      padding: 16px
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, .06)
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 12px
    }

    th,
    td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px;
      text-align: left
    }

    th {
      background: #f3f4f6;
      font-weight: 600
    }

    tr:hover {
      background: #fafafa
    }

    .btn {
      display: inline-block;
      padding: 8px 10px;
      border-radius: 10px;
      text-decoration: none;
      background: #5b1726;
      color: #fff;
      font-size: 12px
    }

    .btn-primary {
      background: #4cc80e
    }

    .btn-secondary {
      background: #5c9552
    }

    .btn:hover {
      filter: brightness(.95)
    }

    .muted {
      color: #6b7280;
      font-size: 14px
    }
  </style>
</head>

<body>

  <div class="nav">
    <a class="brand" href="{% url 'dashboard' %}">IMS</a>
    <div class="links">
      <a href="{% url 'department_list' %}">Department</a>
      <a href="{% url 'employee_list' %}">Employee</a>
      <a href="{% url 'customer_list' %}">Customer</a>
      <a href="{% url 'project_list' %}">Project</a>
      <a href="{% url 'product_list' %}">Product</a>
      <a href="{% url 'assignedto_list' %}">AssignedTo</a>
      <a href="{% url 'projectproduct_list' %}">ProjectProduct</a>
    </div>
  </div>

  <div class="container">
    <div class="card">
      {% block content %}{% endblock %}
      <!-- Tip: inside each page, use <a class="btn" ...>Add</a> and normal <table> -->
    </div>
  </div>

</body>

</html>
