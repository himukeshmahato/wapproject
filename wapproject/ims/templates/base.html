<!doctype html>

<html>

<head>
  <meta charset="utf-8">
  <title>IMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      margin: 0
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1rem
    }

    .navbar {
      background: #343a40;
      color: #fff;
      padding: 0.5rem 0
    }

    .navbar .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem
    }

    .navbar-brand {
      color: #fff;
      text-decoration: none;
    }

    .btn {
      display: inline-block;
      padding: 0.375rem 0.75rem;
      border-radius: 4px;
      text-decoration: none;
      border: 1px solid transparent;
      font-size: 0.9rem;
      background: #e9ecef;
    }

    .btn-sm {
      padding: 0.25rem 0.5rem;
      font-size: 0.8rem
    }

    .btn-primary {
      background: #0d6efd;
      color: #fff;
      border-color: #0d6efd
    }

    .btn-success {
      background: #198754;
      color: #fff;
      border-color: #198754
    }

    .btn-outline-light {
      background: transparent;
      border-color: rgba(255, 255, 255, 0.6);
      color: #fff
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1rem;
      background-color: transparent
    }

    .table th,
    .table td {
      padding: 0.5rem;
      border: 1px solid;
      text-align: left
    }

    .table-striped tbody tr:nth-child(odd) {
      background: #f2f2f2
    }

    .table-sm th,
    .table-sm td {
      padding: 0.25rem
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-dark">
    <div class="container">
      <a class="navbar-brand " href="{% url 'dashboard' %}">IMS</a>

      <div class="d-flex flex-wrap ">
        <a class="btn btn-sm btn-outline-light" href="{% url 'department_list' %}">Department</a>
        <a class="btn btn-sm btn-outline-light" href="{% url 'employee_list' %}">Employee</a>
        <a class="btn btn-sm btn-outline-light" href="{% url 'customer_list' %}">Customer</a>
        <a class="btn btn-sm btn-outline-light" href="{% url 'project_list' %}">Project</a>
        <a class="btn btn-sm btn-outline-light" href="{% url 'product_list' %}">Product</a>
        <a class="btn btn-sm btn-outline-light" href="{% url 'assignedto_list' %}">AssignedTo</a>
        <a class="btn btn-sm btn-outline-light" href="{% url 'projectproduct_list' %}">ProjectProduct</a>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    {% block content %}{% endblock %}
  </div>

</body>

</html>
