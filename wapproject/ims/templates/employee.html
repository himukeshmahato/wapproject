<!DOCTYPE html>
<html>
<head>
    <title>Employee List</title>

    <style>
        table {
            width: 80%;
            border-collapse: collapse;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        h1 {
            text-align: center;
        }
    </style>

</head>
<body>
    <h1>All Employees</h1>
    <table>
        <thead>
            <tr>
                <th>Employee ID</th>
                <th>Name</th>
                <th>Designation</th>
                <th>Salary</th>
                <th>Phone</th>
                <th>Email</th>
                <th>dept_id</th>
            </tr>
        </thead>
        <tbody>
            {% for emp in employees %}
            <tr>
                <td>{{ emp.emp_id }}</td>
                <td>{{ emp.emp_name }}</td>
                <td>{{ emp.designation }}</td>
                <td>{{ emp.salary }}</td>
                <td>{{ emp.phone }}</td>
                <td>{{ emp.email }}</td>
                <td>{{ emp.dept_id }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="6">No employees found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
